<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Finance</title>
<style>
:root { --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d; --text:#e6edf3; --text2:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --yellow:#d29922; --purple:#bc8cff; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:20px; }
h1 { font-size:1.5rem; margin-bottom:1rem; display:flex; align-items:center; gap:10px; }
.tabs { display:flex; gap:4px; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
.tab { padding:10px 18px; cursor:pointer; border-radius:8px 8px 0 0; color:var(--muted); font-weight:500; border:1px solid transparent; border-bottom:none; transition:.2s; }
.tab:hover { color:var(--text2); background:var(--bg2); }
.tab.active { color:var(--accent); background:var(--bg2); border-color:var(--border); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:1.5rem; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.stat-number { font-size:2rem; font-weight:700; }
.stat-label { color:var(--muted); font-size:.8rem; margin-top:4px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.card:hover { border-color:var(--accent); }
.card-title { font-weight:600; }
.card-meta { color:var(--muted); font-size:.85rem; margin-top:6px; }
.badge { padding:3px 10px; border-radius:12px; font-size:.75rem; font-weight:600; }
.badge-active { background:rgba(63,185,80,.15); color:var(--green); }
.badge-canceled { background:rgba(248,81,73,.15); color:var(--red); }
.badge-draft { background:rgba(139,148,158,.15); color:var(--muted); }
.btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:.85rem; transition:.2s; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.actions-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; gap:12px; flex-wrap:wrap; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); display:none; z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; width:90%; max-width:500px; }
.modal h2 { margin-bottom:16px; }
.modal label { display:block; color:var(--muted); font-size:.85rem; margin:12px 0 4px; }
.modal input,.modal select { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:.9rem; }
.modal-actions { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }
.empty { text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>
<div class="container">
  <h1><span>💰</span> Finance</h1>
  <div class="stats-grid" id="revenue-stats"></div>
  <div class="tabs">
    <div class="tab active" data-tab="products">Products</div>
    <div class="tab" data-tab="subscriptions">Subscriptions</div>
    <div class="tab" data-tab="revenue">Revenue</div>
    <div class="tab" data-tab="pending">Pending</div>
  </div>
  <div id="tab-products" class="tab-content">
    <div class="actions-bar"><span></span><button class="btn btn-primary" onclick="showCreateProduct()">+ New Product</button></div>
    <div class="card-grid" id="products-grid"></div>
  </div>
  <div id="tab-subscriptions" class="tab-content" style="display:none">
    <div class="card-grid" id="subs-grid"></div>
  </div>
  <div id="tab-revenue" class="tab-content" style="display:none">
    <div id="revenue-detail"></div>
  </div>
  <div id="tab-pending" class="tab-content" style="display:none">
    <div id="pending-list"></div>
  </div>
</div>
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>New Product</h2>
    <label>Name</label><input id="f-name" placeholder="My SaaS Product">
    <label>Description</label><input id="f-desc" placeholder="AI-powered tool">
    <label>Price (cents)</label><input id="f-amount" type="number" placeholder="1900">
    <label>Interval</label><select id="f-interval"><option value="">One-time</option><option value="month">Monthly</option><option value="year">Yearly</option></select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProduct()">Create</button>
    </div>
  </div>
</div>
<script>
// Session guard
(async()=>{const t=localStorage.getItem('jarvis_token');if(!t){window.location.href='/static/index.html';return;}try{const r=await fetch('/api/v2/status',{headers:{'Authorization':'Bearer '+t,'X-Jarvis-Token':t}});if(r.status===401||r.status===403)window.location.href='/static/index.html';}catch(e){}})();
const API='/api/v3/finance';
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');tab.classList.add('active');document.getElementById('tab-'+tab.dataset.tab).style.display='';load(tab.dataset.tab);});});
async function api(path,opts={}){const t=localStorage.getItem('jarvis_token')||'';const h={'Content-Type':'application/json'};if(t){h['Authorization']='Bearer '+t;h['X-Jarvis-Token']=t;}return(await fetch(path,{...opts,headers:h})).json();}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
async function loadStats(){const d=await api(API+'/revenue_summary');const s=d.data||{};document.getElementById('revenue-stats').innerHTML=`
<div class="stat-card"><div class="stat-number" style="color:var(--green)">€${s.mrr||0}</div><div class="stat-label">MRR</div></div>
<div class="stat-card"><div class="stat-number" style="color:var(--accent)">€${s.arr||0}</div><div class="stat-label">ARR</div></div>
<div class="stat-card"><div class="stat-number">${s.active_subscriptions||0}</div><div class="stat-label">Active Subs</div></div>
<div class="stat-card"><div class="stat-number">${s.total_customers||0}</div><div class="stat-label">Customers</div></div>
<div class="stat-card"><div class="stat-number">${Math.round((s.payment_success_rate||0)*100)}%</div><div class="stat-label">Success Rate</div></div>
<div class="stat-card"><div class="stat-number" style="color:var(--green)">€${s.total_revenue||0}</div><div class="stat-label">Total Revenue</div></div>`;}
async function load(tab){loadStats();if(tab==='products')loadProducts();else if(tab==='subscriptions')loadSubs();else if(tab==='revenue')loadRevenue();else if(tab==='pending')loadPending();}
async function loadProducts(){const d=await api(API+'/products');const g=document.getElementById('products-grid');const items=(d.data?.metadata?.products)||[];g.innerHTML=items.length?items.map(p=>`<div class="card"><div class="card-title">${esc(p.name)}</div><div class="card-meta">${p.id} · ${p.active?'Active':'Inactive'}</div></div>`).join(''):'<div class="empty">No products yet</div>';}
async function loadSubs(){const d=await api(API+'/subscriptions');const g=document.getElementById('subs-grid');const items=(d.data?.metadata?.subscriptions)||[];g.innerHTML=items.length?items.map(s=>`<div class="card"><div class="card-title">${s.id}</div><div class="card-meta">${s.customer} · <span class="badge badge-${s.status}">${s.status}</span></div></div>`).join(''):'<div class="empty">No subscriptions</div>';}
async function loadRevenue(){const d=await api(API+'/pl');const r=d.data||{};document.getElementById('revenue-detail').innerHTML=`<div class="card"><div class="card-title">Monthly Revenue</div><div class="card-meta">${JSON.stringify(r.monthly||[],null,2)}</div></div><div class="card"><div class="card-title">Growth Rate</div><div class="card-meta">${r.growth_rate_pct||0}% MoM</div></div>`;}
async function loadPending(){const d=await api(API+'/pending');const items=d.data||[];document.getElementById('pending-list').innerHTML=items.length?items.map(a=>`<div class="card"><div class="card-title">${esc(a.action)}</div><div class="card-meta">${a.approval_required?'⏳ Awaiting approval':'Ready'}</div><button class="btn" onclick="approveAction('${a.approval_ticket||''}')">Approve</button></div>`).join(''):'<div class="empty">No pending actions</div>';}
function showCreateProduct(){document.getElementById('create-modal').classList.add('show');}
function closeModal(){document.getElementById('create-modal').classList.remove('show');}
async function createProduct(){const name=document.getElementById('f-name').value;const desc=document.getElementById('f-desc').value;await api(API+'/product',{method:'POST',body:JSON.stringify({name,description:desc})});closeModal();load('products');}
async function approveAction(ticket){await api(API+'/approve',{method:'POST',body:JSON.stringify({ticket_id:ticket})});load('pending');}
load('products');
</script>
</body>
</html>
