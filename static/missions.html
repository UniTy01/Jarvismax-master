<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Missions</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #c9d1d9; --muted: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  --yellow: #d29922; --purple: #bc8cff; --orange: #ffa657;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:20px; }
h1 { font-size:1.5rem; margin-bottom:1rem; display:flex; align-items:center; gap:10px; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
.tab { padding:10px 18px; cursor:pointer; border-radius:8px 8px 0 0; color:var(--muted); font-weight:500; border:1px solid transparent; border-bottom:none; transition:all .2s; }
.tab:hover { color:var(--text2); background:var(--bg2); }
.tab.active { color:var(--accent); background:var(--bg2); border-color:var(--border); }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; transition:border-color .2s; cursor:pointer; }
.card:hover { border-color:var(--accent); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.card-title { font-weight:600; font-size:1rem; }
.card-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }

.badge { padding:3px 10px; border-radius:12px; font-size:.75rem; font-weight:600; }
.badge-draft { background:rgba(139,148,158,.15); color:var(--muted); }
.badge-planned { background:rgba(88,166,255,.15); color:var(--accent); }
.badge-running { background:rgba(63,185,80,.15); color:var(--green); }
.badge-paused { background:rgba(210,153,34,.15); color:var(--yellow); }
.badge-waiting_approval { background:rgba(255,166,87,.15); color:var(--orange); }
.badge-completed { background:rgba(63,185,80,.25); color:var(--green); }
.badge-failed { background:rgba(248,81,73,.15); color:var(--red); }
.badge-priority { background:rgba(188,140,255,.15); color:var(--purple); }

.btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:.85rem; transition:all .2s; }
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-primary:hover { opacity:.9; }
.btn-sm { padding:4px 10px; font-size:.75rem; }
.btn-danger { border-color:var(--red); color:var(--red); }
.btn-green { border-color:var(--green); color:var(--green); }

.actions-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; gap:12px; flex-wrap:wrap; }
.search { padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); width:260px; font-size:.9rem; }
.search:focus { outline:none; border-color:var(--accent); }

/* Progress bar */
.progress-bar { height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; border-radius:3px; transition:width .3s; }

/* Timeline */
.timeline { padding:12px 0; }
.timeline-item { display:flex; gap:12px; padding:8px 0; border-left:2px solid var(--border); margin-left:12px; padding-left:16px; position:relative; }
.timeline-item::before { content:''; position:absolute; left:-5px; top:12px; width:8px; height:8px; border-radius:50%; }
.timeline-item.completed::before { background:var(--green); }
.timeline-item.running::before { background:var(--accent); }
.timeline-item.failed::before { background:var(--red); }
.timeline-item.pending::before { background:var(--muted); }
.timeline-item.waiting_approval::before { background:var(--orange); }
.timeline-item.skipped::before { background:var(--border); }
.step-name { font-weight:500; }
.step-meta { color:var(--muted); font-size:.8rem; margin-top:2px; }

/* Detail panel */
.detail-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; display:none; }
.detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.detail-title { font-size:1.3rem; font-weight:600; }
.detail-actions { display:flex; gap:6px; flex-wrap:wrap; }

/* Templates grid */
.template-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; }
.template-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:all .2s; }
.template-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.template-steps { color:var(--muted); font-size:.85rem; margin-top:8px; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; margin-bottom:1.5rem; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.stat-number { font-size:1.8rem; font-weight:700; }
.stat-label { color:var(--muted); font-size:.8rem; margin-top:4px; }

/* Logs */
.log-entry { padding:6px 12px; font-size:.85rem; border-bottom:1px solid var(--border); }
.log-time { color:var(--muted); font-size:.75rem; }

/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); display:none; z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; width:90%; max-width:550px; max-height:80vh; overflow-y:auto; }
.modal h2 { margin-bottom:16px; font-size:1.2rem; }
.modal label { display:block; color:var(--muted); font-size:.85rem; margin:12px 0 4px; }
.modal input, .modal select, .modal textarea { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:.9rem; }
.modal textarea { min-height:80px; resize:vertical; font-family:inherit; }
.modal input:focus, .modal select:focus, .modal textarea:focus { outline:none; border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }
</style>
</head>
<body>
<div class="container">
  <h1><span>🚀</span> Missions</h1>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="tabs">
    <div class="tab active" data-tab="active">Active</div>
    <div class="tab" data-tab="all">All Missions</div>
    <div class="tab" data-tab="templates">Templates</div>
  </div>

  <!-- Active missions -->
  <div id="tab-active" class="tab-content">
    <div class="actions-bar">
      <input class="search" placeholder="Search missions..." id="mission-search">
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="showTemplates()">From Template</button>
        <button class="btn btn-primary" onclick="showCreateModal()">+ New Mission</button>
      </div>
    </div>
    <div id="missions-list"></div>
    <div id="detail-panel" class="detail-panel"></div>
  </div>

  <!-- All missions -->
  <div id="tab-all" class="tab-content" style="display:none">
    <div class="actions-bar">
      <select class="search" id="filter-status" style="width:160px">
        <option value="">All statuses</option>
        <option value="draft">Draft</option>
        <option value="planned">Planned</option>
        <option value="running">Running</option>
        <option value="completed">Completed</option>
        <option value="failed">Failed</option>
      </select>
    </div>
    <div id="all-missions-list"></div>
  </div>

  <!-- Templates -->
  <div id="tab-templates" class="tab-content" style="display:none">
    <div class="template-grid" id="templates-grid"></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2 id="modal-title">New Mission</h2>
    <label>Title</label><input id="f-title" placeholder="Setup SaaS product">
    <label>Objective</label><textarea id="f-objective" placeholder="What should this mission achieve?"></textarea>
    <label>Priority</label>
    <select id="f-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
    <label>Risk Level</label>
    <select id="f-risk"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createMission()">Create</button>
    </div>
  </div>
</div>

<!-- Template Create Modal -->
<div class="modal-overlay" id="template-modal">
  <div class="modal">
    <h2 id="tpl-modal-title">Create from Template</h2>
    <label>Objective (optional)</label><textarea id="tpl-objective" placeholder="Custom objective for this mission..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeTplModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createFromTpl()">Create Mission</button>
    </div>
  </div>
</div>

<script>
// Session guard
(async()=>{const t=localStorage.getItem('jarvis_token');if(!t){window.location.href='/static/index.html';return;}try{const r=await fetch('/api/v2/status',{headers:{'Authorization':'Bearer '+t,'X-Jarvis-Token':t}});if(r.status===401||r.status===403)window.location.href='/static/index.html';}catch(e){}})();
const API = '/api/v3/missions';
let currentTab = 'active';
let selectedTplId = '';

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('tab-' + currentTab).style.display = '';
    loadTab(currentTab);
  });
});

async function api(path, opts = {}) {
  const token = localStorage.getItem('jarvis_token') || '';
  const headers = {'Content-Type':'application/json'};
  if (token) { headers['Authorization'] = 'Bearer ' + token; headers['X-Jarvis-Token'] = token; }
  const res = await fetch(path, {...opts, headers});
  return res.json();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function fmtTime(ts) { return ts ? new Date(ts*1000).toLocaleString() : '—'; }

async function loadTab(tab) {
  loadStats();
  if (tab === 'active') loadActive();
  else if (tab === 'all') loadAll();
  else if (tab === 'templates') loadTemplates();
}

async function loadStats() {
  const data = await api(API+'/stats');
  const s = data.data || {};
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-number" style="color:var(--accent)">${s.total_missions||0}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--green)">${s.active||0}</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--green)">${s.completed||0}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--red)">${s.failed||0}</div><div class="stat-label">Failed</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--orange)">${s.waiting_approval||0}</div><div class="stat-label">Awaiting</div></div>
    <div class="stat-card"><div class="stat-number" style="color:var(--purple)">${s.templates||0}</div><div class="stat-label">Templates</div></div>
  `;
}

function missionCard(m) {
  const pct = m.progress || 0;
  const color = {draft:'var(--muted)',planned:'var(--accent)',running:'var(--green)',paused:'var(--yellow)',waiting_approval:'var(--orange)',completed:'var(--green)',failed:'var(--red)'}[m.status]||'var(--muted)';
  return `<div class="card" onclick="showDetail('${m.mission_id}')">
    <div class="card-header"><span class="card-title">${esc(m.title)}</span><span class="badge badge-${m.status}">${m.status.replace('_',' ')}</span></div>
    <div class="card-meta"><span class="badge badge-priority">${m.priority}</span><span style="color:var(--muted);font-size:.85rem">${m.step_count||0} steps</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

async function loadActive() {
  const data = await api(API+'?status=running&limit=20');
  const running = data.data || [];
  const data2 = await api(API+'?status=waiting_approval&limit=10');
  const waiting = data2.data || [];
  const data3 = await api(API+'?status=planned&limit=10');
  const planned = data3.data || [];
  const all = [...running, ...waiting, ...planned];
  document.getElementById('missions-list').innerHTML = all.length ? all.map(missionCard).join('') : '<p style="color:var(--muted);text-align:center;padding:40px">No active missions. Create one to get started.</p>';
}

async function loadAll() {
  const filter = document.getElementById('filter-status').value;
  const url = filter ? API+'?status='+filter : API;
  const data = await api(url);
  document.getElementById('all-missions-list').innerHTML = (data.data||[]).map(missionCard).join('');
}

async function loadTemplates() {
  const data = await api(API+'/templates/list');
  const grid = document.getElementById('templates-grid');
  grid.innerHTML = (data.data||[]).map(t => `
    <div class="template-card" onclick="selectTemplate('${t.id}')">
      <div class="card-title">${esc(t.title)}</div>
      <div style="color:var(--muted);font-size:.85rem;margin-top:6px">${esc(t.description)}</div>
      <div class="template-steps">${t.step_count} steps · ${t.risk_level} risk${t.past_runs ? ' · '+t.past_runs+' past runs' : ''}</div>
    </div>
  `).join('');
}

async function showDetail(id) {
  const data = await api(API+'/'+id);
  const m = data.data;
  if (!m) return;
  const panel = document.getElementById('detail-panel');
  const pct = m.progress || 0;
  const color = {running:'var(--green)',completed:'var(--green)',failed:'var(--red)',waiting_approval:'var(--orange)'}[m.status]||'var(--accent)';

  let actions = '';
  if (m.status === 'draft' || m.status === 'planned') actions += `<button class="btn btn-green btn-sm" onclick="startMission('${m.mission_id}')">▶ Start</button>`;
  if (m.status === 'running') actions += `<button class="btn btn-sm" onclick="execNext('${m.mission_id}')">⏭ Next Step</button><button class="btn btn-sm" onclick="pauseMission('${m.mission_id}')">⏸ Pause</button>`;
  if (m.status === 'paused') actions += `<button class="btn btn-green btn-sm" onclick="startMission('${m.mission_id}')">▶ Resume</button>`;
  if (!['completed','failed'].includes(m.status)) actions += `<button class="btn btn-danger btn-sm" onclick="cancelMission('${m.mission_id}')">✕ Cancel</button>`;

  let timeline = (m.steps||[]).map(s => {
    let extra = '';
    if (s.status === 'waiting_approval') extra = `<button class="btn btn-green btn-sm" onclick="approveMission('${m.mission_id}','${s.step_id}','approve')">✅ Approve</button> <button class="btn btn-danger btn-sm" onclick="approveMission('${m.mission_id}','${s.step_id}','deny')">❌ Deny</button>`;
    if (s.status === 'failed') extra = `<button class="btn btn-sm" onclick="retryStep('${m.mission_id}','${s.step_id}')">🔄 Retry</button>`;
    return `<div class="timeline-item ${s.status}">
      <div><div class="step-name">${esc(s.name)}</div><div class="step-meta">${esc(s.agent)} · ${s.status}${s.error ? ' · '+esc(s.error) : ''}${s.duration_ms ? ' · '+Math.round(s.duration_ms)+'ms' : ''}</div>${extra}</div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="detail-header">
      <div><div class="detail-title">${esc(m.title)}</div><div style="color:var(--muted);margin-top:4px">${esc(m.objective||m.description)}</div></div>
      <div class="detail-actions">${actions}</div>
    </div>
    <div class="card-meta"><span class="badge badge-${m.status}">${m.status.replace('_',' ')}</span><span class="badge badge-priority">${m.priority}</span><span style="color:var(--muted);font-size:.85rem">${m.duration_seconds ? Math.round(m.duration_seconds)+'s' : ''}</span></div>
    <div class="progress-bar" style="margin:12px 0"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    <h3 style="margin:16px 0 8px">Steps</h3>
    <div class="timeline">${timeline}</div>
  `;
  panel.style.display = '';
}

// Actions
async function startMission(id) { await api(API+'/'+id+'/start',{method:'POST'}); showDetail(id); loadTab(currentTab); }
async function execNext(id) { await api(API+'/'+id+'/execute-next',{method:'POST'}); showDetail(id); loadTab(currentTab); }
async function pauseMission(id) { await api(API+'/'+id+'/pause',{method:'POST'}); showDetail(id); loadTab(currentTab); }
async function cancelMission(id) { if(confirm('Cancel this mission?')){ await api(API+'/'+id+'/cancel',{method:'POST'}); showDetail(id); loadTab(currentTab); } }
async function approveMission(mid,sid,decision) { await api(API+'/'+mid+'/approve',{method:'POST',body:JSON.stringify({step_id:sid,decision})}); showDetail(mid); loadTab(currentTab); }
async function retryStep(mid,sid) { await api(API+'/'+mid+'/steps/'+sid+'/retry',{method:'POST'}); showDetail(mid); }

// Create
function showCreateModal() { document.getElementById('create-modal').classList.add('show'); }
function closeModal() { document.getElementById('create-modal').classList.remove('show'); }
async function createMission() {
  const body = {title:document.getElementById('f-title').value, objective:document.getElementById('f-objective').value, priority:document.getElementById('f-priority').value, risk_level:document.getElementById('f-risk').value};
  const data = await api(API,{method:'POST',body:JSON.stringify(body)});
  closeModal();
  if(data.data) showDetail(data.data.mission_id);
  loadTab(currentTab);
}

// Template
function showTemplates() { document.querySelectorAll('.tab')[2].click(); }
function selectTemplate(id) { selectedTplId = id; document.getElementById('tpl-modal-title').textContent = 'Create: '+id.replace(/_/g,' '); document.getElementById('template-modal').classList.add('show'); }
function closeTplModal() { document.getElementById('template-modal').classList.remove('show'); }
async function createFromTpl() {
  const body = {template_id:selectedTplId, objective:document.getElementById('tpl-objective').value};
  const data = await api(API+'/from-template',{method:'POST',body:JSON.stringify(body)});
  closeTplModal();
  document.querySelectorAll('.tab')[0].click();
  if(data.data) showDetail(data.data.mission_id);
}

document.getElementById('filter-status')?.addEventListener('change', loadAll);
loadTab('active');
</script>
</body>
</html>
