<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--bg2:#111113;--bg3:#18181b;
  --border:rgba(255,255,255,0.07);--border-focus:#3b82f6;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);--blue-glow:rgba(59,130,246,.35);
  --violet:#8b5cf6;
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);
  --green:#22c55e;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --radius:12px;
}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Orbs */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;
}
body::before{
  width:600px;height:600px;top:-200px;left:-150px;
  background:radial-gradient(circle,rgba(59,130,246,.14) 0%,transparent 70%);
  animation:orb1 18s ease-in-out infinite alternate;
}
body::after{
  width:500px;height:500px;bottom:-100px;right:-100px;
  background:radial-gradient(circle,rgba(139,92,246,.10) 0%,transparent 70%);
  animation:orb2 22s ease-in-out infinite alternate;
}
@keyframes orb1{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}100%{transform:translate(-20px,60px) scale(.95)}}
@keyframes orb2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-20px) scale(1.15)}100%{transform:translate(30px,-50px) scale(.9)}}

/* Card */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;margin:16px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px 36px;
  box-shadow:0 0 0 1px rgba(255,255,255,.03),0 32px 80px rgba(0,0,0,.6);
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-mark{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:#fff;
  box-shadow:0 0 20px var(--blue-glow);
}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

h2{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}

/* Form */
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.2px}
input[type=text],input[type=password]{
  width:100%;background:var(--bg3);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius);
  color:var(--text);font-family:inherit;font-size:14px;
  padding:11px 14px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus,input[type=password]:focus{
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
input::placeholder{color:var(--text3)}

/* Remember */
.remember{display:flex;align-items:center;gap:8px;margin-bottom:24px;cursor:pointer}
.remember input{width:14px;height:14px;accent-color:var(--blue);cursor:pointer}
.remember span{font-size:13px;color:var(--text2)}

/* Button */
.btn-login{
  width:100%;padding:12px;
  background:var(--blue);color:#fff;
  border:none;border-radius:var(--radius);
  font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .1s;
  position:relative;overflow:hidden;
}
.btn-login:hover:not(:disabled){opacity:.9}
.btn-login:active:not(:disabled){transform:scale(.99)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.btn-login .spinner{
  display:none;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
  position:absolute;left:50%;top:50%;margin:-8px 0 0 -8px;
}
.btn-login.loading .btn-label{opacity:0}
.btn-login.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-box{
  display:none;align-items:center;gap:8px;
  padding:10px 14px;margin-bottom:20px;
  background:var(--red-dim);border:1px solid rgba(239,68,68,.2);
  border-radius:var(--radius);
  font-size:13px;color:var(--red);
}
.error-box.show{display:flex}

/* Divider */
.divider{height:1px;background:var(--border);margin:24px 0}
.footer-links{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--text3)}
.footer-links a{color:var(--text2);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--text)}

/* Mobile */
@media(max-width:480px){
  .card{padding:32px 24px 28px}
  h2{font-size:20px}
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">J</div>
    <div class="logo-text">
      <div class="logo-name">Jarvis</div>
      <div class="logo-sub">AI Operating System</div>
    </div>
  </div>

  <h2>Sign in</h2>
  <p class="subtitle">Enter your credentials to access the dashboard</p>

  <div class="error-box" id="error-box">
    <span>⚠</span>
    <span id="error-msg">Invalid credentials. Please try again.</span>
  </div>

  <form onsubmit="doLogin(event)">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" required>
    </div>
    <label class="remember">
      <input type="checkbox" id="remember">
      <span>Keep me signed in</span>
    </label>
    <button type="submit" class="btn-login" id="login-btn">
      <div class="spinner"></div>
      <span class="btn-label">Sign in →</span>
    </button>
  </form>

  <div class="divider"></div>
  <div class="footer-links">
    <a href="/index.html">Home</a>
    <a href="/app.html">Dashboard</a>
  </div>
</div>

<script>
// Redirect if already logged in
(function() {
  const token = localStorage.getItem('jarvis_token');
  if (token) {
    const redir = new URLSearchParams(location.search).get('next') || '/app.html';
    window.location.replace(redir);
  }
  // Show hint if redirected from app
  const hint = new URLSearchParams(location.search).get('hint');
  if (hint) {
    const box = document.getElementById('error-box');
    document.getElementById('error-msg').textContent = decodeURIComponent(hint);
    box.style.borderColor = 'rgba(59,130,246,.3)';
    box.style.background = 'rgba(59,130,246,.08)';
    box.style.color = '#93c5fd';
    box.classList.add('show');
  }
})();

async function doLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const errBox = document.getElementById('error-box');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;

  btn.disabled = true;
  btn.classList.add('loading');
  errBox.classList.remove('show');

  try {
    const body = new URLSearchParams({ username, password });
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString(),
    });

    if (r.ok) {
      const data = await r.json();
      const token = data.access_token || data.token;
      if (!token) throw new Error('No token in response');

      // Decode role from JWT payload (no signature check needed client-side)
      let role = 'user';
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        role = payload.role || payload.sub || 'user';
      } catch(_) {}

      // Persist
      localStorage.setItem('jarvis_token', token);
      localStorage.setItem('jarvis_username', username);
      localStorage.setItem('jarvis_role', role);
      if (remember) {
        localStorage.setItem('jarvis_remember', '1');
      } else {
        localStorage.removeItem('jarvis_remember');
      }

      // Redirect
      const next = new URLSearchParams(location.search).get('next') || '/app.html';
      window.location.replace(next);
    } else {
      const err = await r.json().catch(() => ({}));
      showError(err.detail || 'Invalid credentials. Please try again.');
    }
  } catch(ex) {
    showError('Connection error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-box').classList.add('show');
  document.getElementById('password').value = '';
  document.getElementById('password').focus();
}
</script>
</body>
</html>
