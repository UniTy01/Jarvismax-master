<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — Cognitive Events</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0;padding:1rem}
  h1{color:#60a5fa;font-size:1.4rem;margin-bottom:.3rem}
  .sub{color:#888;font-size:.9rem;margin-bottom:1rem}
  .card{background:#1a1d27;border-radius:10px;padding:1rem;margin-bottom:1rem;border:1px solid #2a2d37}
  .card h2{font-size:1rem;color:#93c5fd;margin-bottom:.5rem}
  .tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
  .tab{padding:.4rem .8rem;border-radius:6px;font-size:.8rem;cursor:pointer;border:1px solid #2a2d37;background:#1a1d27;color:#888}
  .tab.active{background:#1e40af;color:white;border-color:#1e40af}
  .stat{display:inline-block;text-align:center;margin:0 1rem .5rem 0}
  .stat .num{font-size:1.6rem;font-weight:bold;color:#60a5fa}
  .stat .lbl{font-size:.7rem;color:#888}
  .pill{display:inline-block;padding:2px 7px;border-radius:12px;font-size:.7rem;font-weight:600;margin:2px}
  .pill.runtime{background:#1e3a5f;color:#60a5fa}
  .pill.lab{background:#3b1f5f;color:#c084fc}
  .pill.system{background:#3d3b1f;color:#fde68a}
  .pill.info{background:#1f3d1f;color:#86efac}
  .pill.warning{background:#78350f;color:#fbbf24}
  .pill.error{background:#7f1d1d;color:#fca5a5}
  .pill.critical{background:#7f1d1d;color:#f87171;font-weight:bold}
  .evt{padding:.5rem 0;border-bottom:1px solid #2a2d37;font-size:.82rem}
  .evt:last-child{border-bottom:none}
  .evt .time{color:#666;font-size:.7rem;margin-right:.5rem}
  .evt .src{color:#888;font-size:.7rem}
  .evt .sum{margin-top:2px}
  .boundary-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .boundary-col h3{font-size:.9rem;margin-bottom:.5rem}
  .boundary-col ul{list-style:none;font-size:.8rem}
  .boundary-col li{padding:2px 0;color:#e0e0e0}
  .lookup{display:flex;gap:.5rem;margin-bottom:.5rem}
  .lookup input{flex:1;background:#0f1117;border:1px solid #2a2d37;color:#e0e0e0;padding:.4rem;border-radius:6px;font-size:.85rem}
  .lookup button{background:#1e40af;color:white;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.8rem}
  #explain-result{display:none;background:#0f1117;padding:.5rem;border-radius:6px;font-size:.8rem;white-space:pre-wrap;max-height:300px;overflow-y:auto}
  .nav{margin-bottom:1rem}
  .nav a{color:#60a5fa;text-decoration:none;font-size:.85rem}
</style>
</head>
<body>
<div class="nav"><a href="/">← Dashboard</a> | <a href="/self-model.html">Self-Model</a> | <a href="/capability-routing.html">Routing</a></div>
<h1>📖 Cognitive Events</h1>
<p class="sub">Unified event journal — runtime, lab, and system events</p>

<div class="tabs">
  <div class="tab active" data-tab="all" onclick="switchTab('all')">All</div>
  <div class="tab" data-tab="runtime" onclick="switchTab('runtime')">Runtime</div>
  <div class="tab" data-tab="lab" onclick="switchTab('lab')">Lab</div>
  <div class="tab" data-tab="degraded" onclick="switchTab('degraded')">Degraded</div>
  <div class="tab" data-tab="explain" onclick="switchTab('explain')">Explain Mission</div>
  <div class="tab" data-tab="boundary" onclick="switchTab('boundary')">Boundary</div>
</div>

<div id="content"><p style="color:#888;font-style:italic">Loading...</p></div>

<script>
const T=localStorage.getItem('jarvis_token')||sessionStorage.getItem('jarvis_token')||'';
const H={'Authorization':'Bearer '+T,'X-Jarvis-Token':T};
let currentTab='all';

async function api(p,o){const r=await fetch(p,{headers:H,...o});if(!r.ok)throw new Error(`${r.status}`);return r.json()}

function ts(t){return new Date(t*1000).toLocaleTimeString()}
function domainPill(d){return `<span class="pill ${d}">${d}</span>`}
function sevPill(s){return ['warning','error','critical'].includes(s)?`<span class="pill ${s}">${s}</span>`:''}

function renderEvents(events){
  if(!events.length)return '<p style="color:#888">No events</p>';
  return events.map(e=>`<div class="evt"><span class="time">${ts(e.timestamp)}</span>${domainPill(e.domain)} ${sevPill(e.severity)} <strong>${e.event_type}</strong> <span class="src">${e.source}</span><div class="sum">${e.summary}${e.mission_id?' <span style="color:#666">['+e.mission_id+']</span>':''}</div></div>`).join('')
}

async function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const el=document.getElementById('content');
  el.innerHTML='<p style="color:#888">Loading...</p>';
  try{
    if(tab==='all'){
      const[s,r]=await Promise.all([api('/api/v3/cognitive-events'),api('/api/v3/cognitive-events/recent?limit=50')]);
      const d=s.data;
      let h='<div class="card">';
      h+=`<div class="stat"><div class="num">${d.total_events}</div><div class="lbl">Total</div></div>`;
      h+=`<div class="stat"><div class="num">${d.in_buffer}</div><div class="lbl">In Buffer</div></div>`;
      for(const[k,v]of Object.entries(d.by_domain||{}))h+=`<div class="stat"><div class="num">${v}</div><div class="lbl">${k}</div></div>`;
      h+='</div>';
      h+='<div class="card"><h2>Recent Events</h2>'+renderEvents(r.data)+'</div>';
      el.innerHTML=h;
    }else if(tab==='runtime'){
      const r=await api('/api/v3/cognitive-events/runtime?limit=50');
      el.innerHTML='<div class="card"><h2>Runtime Events</h2>'+renderEvents(r.data)+'</div>';
    }else if(tab==='lab'){
      const r=await api('/api/v3/cognitive-events/lab?limit=50');
      el.innerHTML='<div class="card"><h2>Lab Events</h2>'+renderEvents(r.data)+'</div>';
    }else if(tab==='degraded'){
      const r=await api('/api/v3/cognitive-events/degraded?limit=50');
      el.innerHTML='<div class="card"><h2>Degraded / Failed</h2>'+renderEvents(r.data)+'</div>';
    }else if(tab==='explain'){
      el.innerHTML=`<div class="card"><h2>Explain Mission</h2><div class="lookup"><input id="mid" placeholder="Mission ID..."/><button onclick="explain()">Explain</button></div><div id="explain-result"></div></div>`;
    }else if(tab==='boundary'){
      const r=await api('/api/v3/cognitive-events/boundary');
      const d=r.data;
      let h='<div class="card"><h2>Runtime / Lab Boundary</h2><p style="font-size:.85rem;color:#888;margin-bottom:1rem">'+d.rule+'</p><div class="boundary-grid">';
      h+='<div class="boundary-col"><h3 style="color:#60a5fa">🛡 Runtime Protected</h3><ul>';
      d.runtime_protected.forEach(s=>h+=`<li>${s}</li>`);
      h+='</ul></div><div class="boundary-col"><h3 style="color:#c084fc">🧪 Lab Subsystems</h3><ul>';
      d.lab_subsystems.forEach(s=>h+=`<li>${s}</li>`);
      h+=`</ul><p style="margin-top:.5rem;font-size:.8rem;color:#888">Bridge: <strong>${d.promotion_bridge}</strong></p></div></div></div>`;
      el.innerHTML=h;
    }
  }catch(e){el.innerHTML=`<div class="card"><h2>Error</h2><p>${e.message}</p></div>`}
}

async function explain(){
  const mid=document.getElementById('mid').value;
  const el=document.getElementById('explain-result');
  el.style.display='block';
  el.textContent='Loading...';
  try{
    const r=await api(`/api/v3/cognitive-events/explain/${mid}`);
    const d=r.data;
    if(!d.found){el.textContent='No events found for this mission.';return}
    const lines=[`Mission: ${mid}`,`Events: ${d.events}`,`Outcome: ${d.outcome||'pending'}`,`Duration: ${d.duration_ms?d.duration_ms+'ms':'?'}`,`Provider: ${d.provider_selected?d.provider_selected.provider_id:'none'}`,`Capabilities: ${(d.capabilities_resolved||[]).join(', ')||'none'}`,`\nNarrative:`,...(d.narrative||[]).map(n=>`  • ${n}`)];
    el.textContent=lines.join('\n');
  }catch(e){el.textContent='Error: '+e.message}
}

switchTab('all');
</script>
</body>
</html>
