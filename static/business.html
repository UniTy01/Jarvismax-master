<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — Business Actions</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0;padding:1rem}
  h1{color:#60a5fa;font-size:1.4rem;margin-bottom:.3rem}
  .sub{color:#888;font-size:.9rem;margin-bottom:1rem}
  .card{background:#1a1d27;border-radius:10px;padding:1rem;margin-bottom:1rem;border:1px solid #2a2d37}
  .card h2{font-size:1rem;color:#93c5fd;margin-bottom:.5rem}
  .tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
  .tab{padding:.4rem .8rem;border-radius:6px;font-size:.8rem;cursor:pointer;border:1px solid #2a2d37;background:#1a1d27;color:#888}
  .tab.active{background:#1e40af;color:white;border-color:#1e40af}
  .stat{display:inline-block;text-align:center;margin:0 1rem .5rem 0}
  .stat .num{font-size:1.6rem;font-weight:bold;color:#60a5fa}
  .stat .lbl{font-size:.7rem;color:#888}
  .pill{display:inline-block;padding:2px 7px;border-radius:12px;font-size:.7rem;font-weight:600;margin:2px}
  .pill.low{background:#1f3d1f;color:#86efac}
  .pill.medium{background:#78350f;color:#fbbf24}
  .pill.high{background:#7f1d1d;color:#fca5a5}
  .pill.ready{background:#1f3d1f;color:#86efac}
  .pill.blocked{background:#7f1d1d;color:#fca5a5}
  .action-card{background:#0f1117;border:1px solid #2a2d37;border-radius:8px;padding:.8rem;margin-bottom:.5rem;cursor:pointer}
  .action-card:hover{border-color:#60a5fa}
  .action-card .title{font-weight:600;font-size:.9rem}
  .action-card .desc{font-size:.8rem;color:#888;margin-top:.2rem}
  .run-item{padding:.5rem 0;border-bottom:1px solid #2a2d37;font-size:.82rem;cursor:pointer}
  .run-item:hover{color:#60a5fa}
  .run-item .time{color:#666;font-size:.7rem}
  .file-item{padding:.3rem 0;font-size:.82rem;cursor:pointer}
  .file-item:hover{color:#60a5fa}
  .file-item .size{color:#666;font-size:.7rem;margin-left:.5rem}
  .viewer{background:#0f1117;border:1px solid #2a2d37;border-radius:8px;padding:1rem;white-space:pre-wrap;font-family:monospace;font-size:.8rem;max-height:500px;overflow-y:auto;margin-top:.5rem}
  .form-group{margin-bottom:.5rem}
  .form-group label{display:block;font-size:.8rem;color:#888;margin-bottom:.2rem}
  .form-group input,.form-group textarea,.form-group select{width:100%;background:#0f1117;border:1px solid #2a2d37;color:#e0e0e0;padding:.4rem;border-radius:6px;font-size:.85rem}
  .form-group textarea{min-height:80px;font-family:monospace}
  .btn{background:#1e40af;color:white;border:none;padding:.5rem 1.2rem;border-radius:6px;cursor:pointer;font-size:.85rem;margin-top:.5rem}
  .btn:hover{background:#1d4ed8}
  .btn.danger{background:#991b1b}
  .approval-banner{background:#78350f;border:1px solid #fbbf24;border-radius:8px;padding:.8rem;margin-bottom:.5rem;font-size:.85rem}
  .nav{margin-bottom:1rem}
  .nav a{color:#60a5fa;text-decoration:none;font-size:.85rem}
  #result{margin-top:.5rem;display:none;font-size:.8rem}
</style>
</head>
<body>
<div class="nav"><a href="/">← Dashboard</a> | <a href="/cognitive-events.html">Events</a> | <a href="/capability-routing.html">Routing</a></div>
<h1>🏢 Business Actions</h1>
<p class="sub">Supervised business execution — real artifacts, approval-gated</p>

<div class="tabs">
  <div class="tab active" data-tab="actions" onclick="switchTab('actions')">Actions</div>
  <div class="tab" data-tab="runs" onclick="switchTab('runs')">Runs</div>
  <div class="tab" data-tab="execute" onclick="switchTab('execute')">Execute</div>
  <div class="tab" data-tab="readiness" onclick="switchTab('readiness')">Readiness</div>
</div>

<div id="content"><p style="color:#888">Loading...</p></div>

<script>
const T=localStorage.getItem('jarvis_token')||sessionStorage.getItem('jarvis_token')||'';
const H={'Authorization':'Bearer '+T,'X-Jarvis-Token':T};
let currentTab='actions';
let allActions=[];

async function api(p,o){const r=await fetch(p,{headers:H,...o});if(!r.ok)throw new Error(`${r.status}`);return r.json()}

function riskPill(r){return `<span class="pill ${r}">${r}</span>`}

async function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const el=document.getElementById('content');
  el.innerHTML='<p style="color:#888">Loading...</p>';
  try{
    if(tab==='actions'){
      const r=await api('/api/v3/business-actions');
      allActions=r.data;
      let h='';
      for(const a of r.data){
        h+=`<div class="action-card"><div class="title">${a.name} ${riskPill(a.risk_level)}${a.requires_approval?' <span class="pill medium">approval</span>':''}</div><div class="desc">${a.description}</div><div style="margin-top:.3rem;font-size:.7rem;color:#666">ID: ${a.action_id} | Agent: ${a.agent} | Outputs: ${a.expected_outputs.join(', ')}</div></div>`;
      }
      el.innerHTML='<div class="card"><h2>Registered Actions ('+r.data.length+')</h2>'+h+'</div>';
    }else if(tab==='runs'){
      const r=await api('/api/v3/business-artifacts/runs');
      if(!r.data.length){el.innerHTML='<div class="card"><h2>Runs</h2><p style="color:#888">No business runs yet.</p></div>';return}
      let h='<div class="card"><h2>Run History ('+r.data.length+')</h2>';
      for(const run of r.data){
        h+=`<div class="run-item" onclick="viewRun('${run.run_id}')"><strong>${run.run_id}</strong> <span class="time">${run.timestamp}</span><br/><span style="color:#888;font-size:.75rem">${run.action_id||'unknown'} · ${run.file_count} files · ${(run.total_size/1024).toFixed(1)}KB</span></div>`;
      }
      h+='</div>';
      el.innerHTML=h;
    }else if(tab==='execute'){
      if(!allActions.length){const r=await api('/api/v3/business-actions');allActions=r.data}
      let opts=allActions.map(a=>`<option value="${a.action_id}">${a.name} (${a.risk_level})</option>`).join('');
      el.innerHTML=`<div class="card"><h2>Execute Business Action</h2><div class="form-group"><label>Action</label><select id="exec-action">${opts}</select></div><div class="form-group"><label>Project Name (optional)</label><input id="exec-name" placeholder="my-project"/></div><div class="form-group"><label>Agent Output (JSON)</label><textarea id="exec-output">{"sector":"AI Automation","synthesis":"Market analysis","opportunities":[{"title":"Test","score":7}]}</textarea></div><button class="btn" onclick="executeAction()">Execute</button><div id="result"></div></div>`;
    }else if(tab==='readiness'){
      const r=await api('/api/v3/business-actions/readiness');
      const d=r.data;
      let h=`<div class="card"><div class="stat"><div class="num">${d.ready}</div><div class="lbl">Ready</div></div><div class="stat"><div class="num">${d.blocked}</div><div class="lbl">Blocked</div></div><div class="stat"><div class="num">${d.total}</div><div class="lbl">Total</div></div></div>`;
      h+='<div class="card"><h2>Action Readiness</h2>';
      for(const[aid,info]of Object.entries(d.actions)){
        const ready=info.ready;
        h+=`<div style="padding:.4rem 0;border-bottom:1px solid #2a2d37"><strong>${aid}</strong> <span class="pill ${ready?'ready':'blocked'}">${ready?'ready':'blocked'}</span>${info.requires_approval?' <span class="pill medium">approval</span>':''}`;
        if(info.missing_secrets?.length)h+=`<br/><span style="color:#fca5a5;font-size:.75rem">Missing secrets: ${info.missing_secrets.join(', ')}</span>`;
        if(info.missing_tools?.length)h+=`<br/><span style="color:#fca5a5;font-size:.75rem">Missing tools: ${info.missing_tools.join(', ')}</span>`;
        h+='</div>';
      }
      h+='</div>';
      el.innerHTML=h;
    }
  }catch(e){el.innerHTML=`<div class="card"><h2>Error</h2><p>${e.message}</p></div>`}
}

async function viewRun(runId){
  const el=document.getElementById('content');
  el.innerHTML='<p style="color:#888">Loading...</p>';
  try{
    const r=await api(`/api/v3/business-artifacts/runs/${runId}/files`);
    let h=`<div class="card"><h2>📂 ${runId}</h2><button class="btn" onclick="switchTab('runs')" style="margin-bottom:.5rem;font-size:.75rem;padding:.3rem .6rem">← Back</button>`;
    for(const f of r.data){
      if(f.is_text){
        h+=`<div class="file-item" onclick="viewFile('${runId}','${f.name}')">📄 <strong>${f.name}</strong><span class="size">${(f.size/1024).toFixed(1)}KB</span></div>`;
      }else{
        h+=`<div class="file-item">📦 ${f.name}<span class="size">${(f.size/1024).toFixed(1)}KB</span> <a href="/api/v3/business-artifacts/runs/${runId}/download/${f.name}" style="color:#60a5fa;font-size:.7rem">download</a></div>`;
      }
    }
    h+='<div id="file-viewer"></div></div>';
    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="card"><h2>Error</h2><p>${e.message}</p></div>`}
}

async function viewFile(runId,filename){
  const el=document.getElementById('file-viewer');
  el.innerHTML='<p style="color:#888">Loading...</p>';
  try{
    const r=await api(`/api/v3/business-artifacts/runs/${runId}/files/${filename}`);
    el.innerHTML=`<h3 style="margin-top:1rem;font-size:.9rem;color:#93c5fd">${filename}</h3><div class="viewer">${escapeHtml(r.data.content)}</div>`;
  }catch(e){el.innerHTML=`<p style="color:#fca5a5">${e.message}</p>`}
}

async function executeAction(){
  const res=document.getElementById('result');
  res.style.display='block';
  res.innerHTML='<p style="color:#888">Executing...</p>';
  try{
    const body={action_id:document.getElementById('exec-action').value,project_name:document.getElementById('exec-name').value,agent_output:JSON.parse(document.getElementById('exec-output').value)};
    const r=await api('/api/v3/business-actions/execute',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=r.data;
    let h=`<div style="color:#86efac">✅ ${d.action_id} executed</div><div style="font-size:.8rem;color:#888;margin-top:.3rem">Dir: ${d.project_dir}<br/>Files: ${d.files_created?.join(', ')}`;
    if(d.awaiting_approval)h+=`<br/><span style="color:#fbbf24">⚠️ Awaiting approval — check approval-required.md</span>`;
    h+='</div>';
    res.innerHTML=h;
  }catch(e){
    res.innerHTML=`<div style="color:#fca5a5">Error: ${e.message}</div>`;
  }
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

switchTab('actions');
</script>
</body>
</html>
