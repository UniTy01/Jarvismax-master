<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JarvisMax — Plan Runs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#58a6ff}
.header a{color:#8b949e;text-decoration:none;font-size:13px}
.content{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
.stat .val{font-size:28px;font-weight:700;color:#f0f6fc}
.stat .label{color:#8b949e;font-size:12px;margin-top:4px}
.section{margin-bottom:32px}
.section h2{color:#f0f6fc;font-size:16px;margin-bottom:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;border-bottom:1px solid #30363d;color:#8b949e;font-size:12px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid #21262d;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.running{background:#0c2d6b;color:#58a6ff}.completed{background:#1b4332;color:#2dd4bf}
.failed{background:#4a1919;color:#f87171}.paused{background:#422006;color:#fbbf24}
.cancelled{background:#21262d;color:#8b949e}.awaiting_approval{background:#3b1f6e;color:#c084fc}
.bar{height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.bar-fill.ok{background:#2dd4bf}.bar-fill.warn{background:#fbbf24}.bar-fill.bad{background:#f87171}
.btn{background:#238636;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}
.btn:hover{background:#2ea043}
.btn.warn{background:#9a6700}.btn.danger{background:#da3633}
.detail{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-top:16px}
.step-row{padding:8px;border-left:3px solid #30363d;margin:4px 0;background:#0d1117;border-radius:0 4px 4px 0}
.step-row.completed{border-left-color:#2dd4bf}.step-row.failed{border-left-color:#f87171}
.step-row.running{border-left-color:#58a6ff}.step-row.pending{border-left-color:#30363d}
.hidden{display:none}
pre{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:8px;font-size:11px;overflow-x:auto;max-height:200px;margin-top:8px}
.approval-box{background:#1a0a3e;border:1px solid #7c3aed;border-radius:8px;padding:16px;margin:12px 0}
.approval-box h3{color:#c084fc;margin-bottom:8px}
</style>
</head>
<body>
<div class="header">
  <h1>▶️ Plan Runs</h1>
  <a href="/">← Back to Dashboard</a>
</div>
<div class="content">
  <div class="grid" id="stats"></div>
  <div class="section" id="active-section">
    <h2>🔴 Active & Awaiting</h2>
    <div id="active-runs"></div>
  </div>
  <div class="section">
    <h2>📋 All Runs</h2>
    <table><thead><tr><th>Run ID</th><th>Plan</th><th>Status</th><th>Progress</th><th>Steps</th><th>Duration</th><th>Actions</th></tr></thead>
    <tbody id="all-runs"></tbody></table>
  </div>
  <div class="section hidden" id="detail-section">
    <h2 id="detail-title">Run Detail</h2>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const T=localStorage.getItem('jarvis_token')||'';
const H={'Content-Type':'application/json','Authorization':'Bearer '+T,'X-Jarvis-Token':T};
async function api(u,m,b){const o={headers:H};if(m){o.method=m}if(b){o.body=JSON.stringify(b)}try{const r=await fetch(u,o);return await r.json()}catch(e){return{ok:false,error:e.message}}}

function badge(s){return `<span class="badge ${s}">${s.replace('_',' ')}</span>`}
function dur(ms){if(ms<1000)return ms+'ms';if(ms<60000)return (ms/1000).toFixed(1)+'s';return (ms/60000).toFixed(1)+'m'}

async function load(){
  const runs=await api('/api/v3/runs');
  if(!runs.ok)return;
  const data=runs.data||[];

  // Stats
  const active=data.filter(r=>['running','paused','awaiting_approval'].includes(r.status));
  const completed=data.filter(r=>r.status==='completed');
  const failed=data.filter(r=>r.status==='failed');
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="val">${data.length}</div><div class="label">Total Runs</div></div>
    <div class="stat"><div class="val" style="color:#58a6ff">${active.length}</div><div class="label">Active</div></div>
    <div class="stat"><div class="val" style="color:#2dd4bf">${completed.length}</div><div class="label">Completed</div></div>
    <div class="stat"><div class="val" style="color:#f87171">${failed.length}</div><div class="label">Failed</div></div>
  `;

  // Active runs with detail
  if(active.length){
    let html='';
    for(const r of active){
      html+=`<div class="detail">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${r.run_id.slice(0,16)}</strong> ${badge(r.status)}</div>
          <div>
            ${r.status==='paused'||r.status==='awaiting_approval'?`<button class="btn" onclick="resumeRun('${r.run_id}')">▶ Resume</button>`:''}
            <button class="btn danger" onclick="cancelRun('${r.run_id}')">✕ Cancel</button>
          </div>
        </div>
        <div style="color:#8b949e;margin:8px 0">Goal: ${r.context?.goal||'—'} | Progress: ${Math.round(r.progress*100)}%</div>
        <div class="bar"><div class="bar-fill ${r.status==='failed'?'bad':r.status==='awaiting_approval'?'warn':'ok'}" style="width:${Math.round(r.progress*100)}%"></div></div>`;

      // Approval box
      if(r.status==='awaiting_approval'){
        html+=`<div class="approval-box"><h3>⏸ Awaiting Approval</h3>
          <p>Step: <strong>${r.current_step_id}</strong></p>
          <button class="btn" onclick="approveStep('${r.run_id}','${r.current_step_id}')">✅ Approve & Resume</button>
        </div>`;
      }

      // Steps
      if(r.context?.step_outputs){
        html+=`<div style="margin-top:12px">`;
        // We need plan steps — approximate from context
        const outputs=r.context.step_outputs;
        for(const[sid,out]of Object.entries(outputs)){
          html+=`<div class="step-row completed"><strong>${sid}</strong>: ${JSON.stringify(out).slice(0,120)}…</div>`;
        }
        if(r.current_step_id && !outputs[r.current_step_id]){
          html+=`<div class="step-row ${r.status==='awaiting_approval'?'running':'pending'}"><strong>${r.current_step_id}</strong>: ${r.status==='awaiting_approval'?'⏸ waiting for approval':'⏳ pending'}</div>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    document.getElementById('active-runs').innerHTML=html;
    document.getElementById('active-section').classList.remove('hidden');
  }else{
    document.getElementById('active-runs').innerHTML='<p style="color:#8b949e">No active runs.</p>';
  }

  // All runs table
  let rows='';
  for(const r of data){
    const pct=Math.round(r.progress*100);
    rows+=`<tr>
      <td><a href="#" onclick="showDetail('${r.run_id}');return false" style="color:#58a6ff">${r.run_id.slice(0,16)}</a></td>
      <td>${(r.plan_id||'').slice(0,12)}</td>
      <td>${badge(r.status)}</td>
      <td><div class="bar" style="width:100px;display:inline-block"><div class="bar-fill ok" style="width:${pct}%"></div></div> ${pct}%</td>
      <td>${r.steps_completed}/${r.steps_total}</td>
      <td>${dur(r.duration_ms)}</td>
      <td>${r.status==='paused'||r.status==='awaiting_approval'?`<button class="btn" onclick="resumeRun('${r.run_id}')">Resume</button>`:''}</td>
    </tr>`;
  }
  document.getElementById('all-runs').innerHTML=rows||'<tr><td colspan="7" style="color:#8b949e">No runs yet</td></tr>';
}

async function showDetail(runId){
  const[r,c,a]=await Promise.all([
    api(`/api/v3/plans/runs/${runId}`),
    api(`/api/v3/plans/runs/${runId}/context`),
    api(`/api/v3/plans/runs/${runId}/artifacts`),
  ]);
  if(!r.ok)return;
  const run=r.data;
  let html=`<div class="detail">
    <div style="display:flex;justify-content:space-between"><div>${badge(run.status)}</div><div>Duration: ${dur(run.duration_ms)}</div></div>
    <p style="margin:8px 0"><strong>Goal:</strong> ${run.context?.goal||'—'}</p>
    <p><strong>Progress:</strong> ${run.steps_completed}/${run.steps_total} steps</p>
    ${run.error?`<p style="color:#f87171"><strong>Error:</strong> ${run.error}</p>`:''}`;

  // Context outputs
  if(c.ok&&c.data.step_outputs){
    html+=`<h3 style="margin-top:16px;color:#58a6ff">Step Outputs</h3>`;
    for(const[sid,out]of Object.entries(c.data.step_outputs)){
      html+=`<div class="step-row completed"><strong>${sid}</strong><pre>${JSON.stringify(out,null,2).slice(0,500)}</pre></div>`;
    }
  }

  // Approval decisions
  if(c.ok&&Object.keys(c.data.approval_decisions||{}).length){
    html+=`<h3 style="margin-top:16px;color:#c084fc">Approval Decisions</h3>`;
    for(const[sid,dec]of Object.entries(c.data.approval_decisions)){
      html+=`<div class="step-row completed"><strong>${sid}</strong>: ${dec.approved?'✅ Approved':'❌ Denied'} — ${dec.reason||'no reason'}</div>`;
    }
  }

  // Artifacts
  if(a.ok&&a.data.artifacts?.length){
    html+=`<h3 style="margin-top:16px;color:#2dd4bf">Artifacts</h3><ul>`;
    for(const art of a.data.artifacts)html+=`<li style="margin:4px 0">${art}</li>`;
    html+=`</ul>`;
  }

  html+=`</div>`;
  document.getElementById('detail-title').textContent=`Run: ${runId.slice(0,16)}`;
  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail-section').classList.remove('hidden');
  document.getElementById('detail-section').scrollIntoView({behavior:'smooth'});
}

async function resumeRun(id){await api(`/api/v3/runs/resume/${id}`,'POST');load()}
async function cancelRun(id){await api(`/api/v3/runs/cancel/${id}`,'POST');load()}
async function approveStep(runId,stepId){
  await api(`/api/v3/runs/approve-step/${runId}`,'POST',{step_id:stepId,reason:'Approved via dashboard'});
  await api(`/api/v3/runs/resume/${runId}`,'POST');
  load();
}

if(!T){location.href='/login.html'}
load();
setInterval(load,10000); // Auto-refresh every 10s
</script>
</body>
</html>
