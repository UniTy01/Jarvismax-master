<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — Capability Routing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; padding: 1rem; }
  h1 { color: #60a5fa; margin-bottom: 0.5rem; font-size: 1.4rem; }
  .subtitle { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .card { background: #1a1d27; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #2a2d37; }
  .card h2 { font-size: 1rem; color: #93c5fd; margin-bottom: 0.5rem; }
  .stat { display: inline-block; text-align: center; margin: 0 1rem 0.5rem 0; }
  .stat .num { font-size: 1.8rem; font-weight: bold; color: #60a5fa; }
  .stat .lbl { font-size: 0.75rem; color: #888; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin: 2px; }
  .pill.agent { background: #1e3a5f; color: #60a5fa; }
  .pill.mcp { background: #3b1f5f; color: #c084fc; }
  .pill.tool { background: #1f3d1f; color: #86efac; }
  .pill.module { background: #3d3b1f; color: #fde68a; }
  .pill.ready { background: #065f46; color: #34d399; }
  .pill.blocked { background: #7f1d1d; color: #fca5a5; }
  .item { padding: 0.5rem 0; border-bottom: 1px solid #2a2d37; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
  .item:last-child { border-bottom: none; }
  .item .name { flex: 1; font-weight: 500; }
  .item .info { color: #888; font-size: 0.75rem; }
  .test-box { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .test-box input { flex: 1; background: #0f1117; border: 1px solid #2a2d37; color: #e0e0e0; padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; }
  .test-box button { background: #1e40af; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
  .test-box button:hover { background: #2563eb; }
  .result { background: #0f1117; padding: 0.5rem; border-radius: 6px; margin-top: 0.5rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; display: none; max-height: 300px; overflow-y: auto; }
  .history-item { padding: 0.4rem 0; border-bottom: 1px solid #2a2d37; font-size: 0.8rem; }
  .history-item .cap { color: #93c5fd; font-weight: 500; }
  .history-item .prov { color: #86efac; }
  .history-item .score { color: #fbbf24; }
  .success { color: #34d399; }
  .failure { color: #f87171; }
  .pending { color: #888; }
  .nav { margin-bottom: 1rem; }
  .nav a { color: #60a5fa; text-decoration: none; font-size: 0.85rem; }
  .refresh-btn { background: #1e40af; color: white; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-left: 0.5rem; }
</style>
</head>
<body>

<div class="nav"><a href="/">← Dashboard</a> | <a href="/self-model.html">Self-Model</a></div>
<h1>⚡ Capability Routing</h1>
<p class="subtitle">Capability-first provider selection — what Jarvis routes and how</p>

<div id="content"><p style="color:#888;font-style:italic">Loading...</p></div>

<script>
const TOKEN = localStorage.getItem('jarvis_token') || sessionStorage.getItem('jarvis_token') || '';
const H = { 'Authorization': 'Bearer ' + TOKEN, 'X-Jarvis-Token': TOKEN };

async function api(path, opts) {
  const r = await fetch(path, { headers: H, ...opts });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

function typePill(t) {
  return `<span class="pill ${t}">${t}</span>`;
}

async function load() {
  const el = document.getElementById('content');
  try {
    const [summary, caps, history] = await Promise.all([
      api('/api/v3/capability-routing/summary'),
      api('/api/v3/capability-routing/capabilities'),
      api('/api/v3/capability-routing/history?limit=20'),
    ]);
    const reg = summary.data.registry;
    const rt = summary.data.routing;

    let html = '';

    // Stats
    html += '<div class="card">';
    html += `<div class="stat"><div class="num">${reg.capabilities}</div><div class="lbl">Capabilities</div></div>`;
    html += `<div class="stat"><div class="num">${reg.total_providers}</div><div class="lbl">Providers</div></div>`;
    for (const [t, n] of Object.entries(reg.by_type || {})) {
      html += `<div class="stat"><div class="num">${n}</div><div class="lbl">${t}s</div></div>`;
    }
    if (rt.total_decisions > 0) {
      html += `<div class="stat"><div class="num">${(rt.success_rate * 100).toFixed(0)}%</div><div class="lbl">Success</div></div>`;
      html += `<div class="stat"><div class="num">${rt.total_decisions}</div><div class="lbl">Decisions</div></div>`;
    }
    html += '</div>';

    // Test routing
    html += '<div class="card"><h2>Test Routing</h2>';
    html += '<div class="test-box"><input id="goal" placeholder="Enter a mission goal..." value="Fix the auth bug in api/auth.py"/><button onclick="testRoute()">Route</button></div>';
    html += '<div id="route-result" class="result"></div></div>';

    // Capabilities
    const capEntries = Object.entries(caps.data).sort((a, b) => a[0].localeCompare(b[0]));
    html += `<div class="card"><h2>Known Capabilities (${capEntries.length})</h2>`;
    for (const [id, info] of capEntries) {
      const avail = info.available > 0 ? 'ready' : 'blocked';
      html += `<div class="item"><span class="name">${id}</span><span class="info">${info.total_providers} providers</span><span class="pill ${avail}">${info.available}/${info.total_providers} avail</span></div>`;
    }
    html += '</div>';

    // History
    const hist = history.data.history;
    if (hist.length > 0) {
      html += `<div class="card"><h2>Recent Routing History</h2>`;
      for (const h of hist) {
        const outcome = h.success === true ? '<span class="success">✓</span>'
          : h.success === false ? '<span class="failure">✗</span>'
          : '<span class="pending">…</span>';
        html += `<div class="history-item">${outcome} <span class="cap">${h.capability_id}</span> → <span class="prov">${h.provider_id}</span> <span class="score">${h.score.toFixed(2)}</span>${h.fallback_used ? ' <span class="pill blocked">fallback</span>' : ''}</div>`;
      }
      html += '</div>';
    }

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="card"><h2>Error</h2><p>${e.message}</p><p>Ensure you are logged in.</p></div>`;
  }
}

async function testRoute() {
  const goal = document.getElementById('goal').value;
  const el = document.getElementById('route-result');
  el.style.display = 'block';
  el.textContent = 'Routing...';
  try {
    const r = await api('/api/v3/capability-routing/route', {
      method: 'POST',
      headers: { ...H, 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }),
    });
    const lines = [];
    for (const d of r.data.decisions) {
      lines.push(`Capability: ${d.capability_id}`);
      if (d.selected) {
        lines.push(`  Selected: ${d.selected.provider_id} (${d.selected.provider_type})`);
        lines.push(`  Score: ${d.score.toFixed(3)}`);
        lines.push(`  Readiness: ${d.selected.readiness} | Reliability: ${d.selected.reliability}`);
      } else {
        lines.push(`  No provider found (fallback=${d.fallback_used})`);
      }
      if (d.all_candidates.length > 1) {
        lines.push(`  Alternatives: ${d.all_candidates.slice(1).map(c => c.provider_id + ' (' + c.total_score.toFixed(2) + ')').join(', ')}`);
      }
      if (d.blocked_candidates.length > 0) {
        lines.push(`  Blocked: ${d.blocked_candidates.map(c => c.provider_id + ' [' + c.blocked_reason + ']').join(', ')}`);
      }
    }
    el.textContent = lines.join('\n');
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
  }
}

load();
</script>
</body>
</html>
