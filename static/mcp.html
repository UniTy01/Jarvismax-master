<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — MCP Servers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;padding:16px 24px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;color:#58a6ff}
.stats{display:flex;gap:12px;font-size:13px}
.stats .stat{background:#21262d;padding:6px 12px;border-radius:6px;color:#8b949e}
.stats b{color:#f0883e}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;background:#21262d;color:#8b949e;border:1px solid #30363d}
.filter.active{background:#1f6feb;color:#fff;border-color:#1f6feb}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-name{font-weight:600;font-size:15px;color:#c9d1d9}
.card-desc{font-size:13px;color:#8b949e;margin-bottom:8px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-official{background:#0d2d18;color:#3fb950}
.badge-vendor{background:#0a2647;color:#58a6ff}
.badge-managed{background:#2d1b00;color:#d29922}
.badge-community{background:#21262d;color:#8b949e}
.badge-untrusted{background:#350c0c;color:#f85149}
.health-ready{color:#3fb950}.health-needs_setup{color:#d29922}.health-disabled{color:#484f58}.health-error{color:#f85149}.health-restricted{color:#d29922}
.tools-list{font-size:12px;color:#484f58;margin-top:4px}
.actions{display:flex;gap:6px;margin-top:10px}
.btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.btn-enable{background:#238636;color:#fff}.btn-disable{background:#da3633;color:#fff}
.btn-test{background:#21262d;color:#8b949e;border:1px solid #30363d}
.missing{background:#350c0c;border-radius:4px;padding:6px 10px;font-size:12px;color:#f85149;margin-top:6px}
.nav-back{color:#58a6ff;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div><a href="/index.html" class="nav-back">← Dashboard</a><h1>🔌 MCP Servers</h1></div>
  <div class="stats" id="stats"></div>
</div>
<div class="container">
  <div class="filters" id="filters">
    <div class="filter active" onclick="setFilter('')">All</div>
    <div class="filter" onclick="setFilter('engineering')">Engineering</div>
    <div class="filter" onclick="setFilter('data')">Data</div>
    <div class="filter" onclick="setFilter('security')">Security</div>
  </div>
  <div id="content"></div>
</div>
<script>
const TOKEN=localStorage.getItem('jarvis_token')||localStorage.getItem('authToken')||'';
const H={'Authorization':TOKEN,'Content-Type':'application/json'};
let cat='';
function setFilter(c){cat=c;document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));event.target.classList.add('active');load()}
async function api(p,o){try{const r=await fetch(p,{headers:H,...(o||{})});if(r.status===401){window.location='/index.html';return null}return r.json()}catch(e){return null}}
function trustBadge(t){const m={'official':'badge-official','vendor':'badge-vendor','managed':'badge-managed','community':'badge-community','untrusted':'badge-untrusted'};return`<span class="badge ${m[t]||'badge-community'}">${t}</span>`}
async function load(){
  const s=await api('/api/v3/mcp/stats');
  if(s)document.getElementById('stats').innerHTML=`<div class="stat">Servers: <b>${s.total_servers}</b></div><div class="stat">Tools: <b>${s.total_tools}</b></div>`;
  const q=cat?`?category=${cat}`:'';
  const d=await api('/api/v3/mcp/servers'+q);
  if(!d||!d.servers.length){document.getElementById('content').innerHTML='<div style="color:#484f58;text-align:center;padding:40px">No MCP servers found</div>';return}
  document.getElementById('content').innerHTML=d.servers.map(s=>{
    const hc=s.health==='ready'?'health-ready':s.health==='needs_setup'?'health-needs_setup':s.health==='disabled'?'health-disabled':'health-error';
    const tools=s.discovered_tools?.join(', ')||'No tools discovered';
    const miss=s.required_secrets?.length?s.required_secrets.filter(x=>true):[]; // simplified
    return`<div class="card">
      <div class="card-header"><span class="card-name">${s.name}</span><span class="${hc}" style="font-weight:600">${s.health}</span></div>
      <div class="card-desc">${s.description}</div>
      <div class="card-meta">${trustBadge(s.trust)}<span class="badge" style="background:#21262d;color:#8b949e">${s.risk} risk</span><span class="badge" style="background:#21262d;color:#8b949e">${s.tools_count} tools</span>${s.requires_approval?'<span class="badge badge-untrusted">approval required</span>':''}</div>
      <div class="tools-list">Tools: ${tools}</div>
      ${s.required_secrets?.length?`<div class="missing">Required secrets: ${s.required_secrets.join(', ')}</div>`:''}
      <div class="actions">
        ${s.status==='disabled'?`<button class="btn btn-enable" onclick="act('${s.id}','enable')">Enable</button>`:`<button class="btn btn-disable" onclick="act('${s.id}','disable')">Disable</button>`}
        <button class="btn btn-test" onclick="test('${s.id}')">🔍 Health Check</button>
      </div></div>`}).join('')
}
async function act(id,a){await api(`/api/v3/mcp/servers/${id}/${a}`,{method:'POST'});load()}
async function test(id){const r=await api(`/api/v3/mcp/servers/${id}/health`);if(r)alert(`Health: ${r.health}\n${r.message||''}\n${r.missing_secrets?.length?'Missing: '+r.missing_secrets.join(', '):''}`);load()}
if(!TOKEN)window.location='/index.html';
load();
</script>
</body>
</html>
