<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JarvisMax — Operations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#58a6ff}
.status-badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.ready{background:#1b4332;color:#2dd4bf}.not-ready{background:#4a1919;color:#f87171}
.tabs{display:flex;gap:0;border-bottom:1px solid #30363d;background:#161b22;padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;font-size:14px}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.content{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h3{color:#58a6ff;font-size:14px;margin-bottom:8px}
.card .val{font-size:24px;font-weight:700;color:#f0f6fc}
.card .sub{color:#8b949e;font-size:12px;margin-top:4px}
table{width:100%;border-collapse:collapse;margin:12px 0}
th{text-align:left;padding:8px 12px;border-bottom:1px solid #30363d;color:#8b949e;font-size:12px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid #21262d;font-size:13px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill.low{background:#1b4332;color:#2dd4bf}.pill.medium{background:#422006;color:#fbbf24}.pill.high{background:#4a1919;color:#f87171}
.hidden{display:none}
.btn{background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.btn:hover{background:#2ea043}
.btn.secondary{background:#21262d;color:#c9d1d9}
pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;overflow-x:auto;margin:8px 0}
#content-area .section{margin-bottom:32px}
</style>
</head>
<body>
<div class="header">
  <h1>🔧 JarvisMax Operations</h1>
  <div id="system-status"></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('agents')">Agents</div>
  <div class="tab" onclick="showTab('skills')">Skills</div>
  <div class="tab" onclick="showTab('tools')">Tools</div>
  <div class="tab" onclick="showTab('plans')">Plans</div>
  <div class="tab" onclick="showTab('history')">History</div>
  <div class="tab" onclick="showTab('templates')">Templates</div>
</div>
<div class="content" id="content-area"></div>

<script>
const T=localStorage.getItem('jarvis_token')||'';
const H={'Content-Type':'application/json','Authorization':'Bearer '+T,'X-Jarvis-Token':T};
async function api(u){try{const r=await fetch(u,{headers:H});return await r.json()}catch(e){return{ok:false,error:e.message}}}
function pill(risk){return `<span class="pill ${risk}">${risk}</span>`}

async function showTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>{if(e.textContent.toLowerCase().includes(t))e.classList.add('active')});
  const area=document.getElementById('content-area');
  if(t==='overview')await renderOverview(area);
  else if(t==='agents')await renderAgents(area);
  else if(t==='skills')await renderSkills(area);
  else if(t==='tools')await renderTools(area);
  else if(t==='plans')await renderPlans(area);
  else if(t==='history')await renderHistory(area);
  else if(t==='templates')await renderTemplates(area);
}

async function renderOverview(el){
  const r=await api('/api/v3/readiness');
  if(!r.ok){el.innerHTML='<p>Failed to load readiness</p>';return}
  const layers=r.layers||{};
  let html='<div class="grid">';
  html+=`<div class="card"><h3>System Status</h3><div class="val">${r.score}</div><div class="sub">layers ready</div></div>`;
  for(const[name,data]of Object.entries(layers)){
    const ok=data.ready?'✅':'❌';
    html+=`<div class="card"><h3>${ok} ${name.charAt(0).toUpperCase()+name.slice(1)} Layer</h3>`;
    if(name==='skills')html+=`<div class="val">${data.count||0}</div><div class="sub">skills loaded</div>`;
    else if(name==='execution')html+=`<div class="val">${data.tools_ready||0}/${data.tools_total||0}</div><div class="sub">tools ready</div>`;
    else if(name==='planning')html+=`<div class="val">${data.templates||0}</div><div class="sub">templates</div>`;
    else html+=`<div class="sub">${JSON.stringify(data).slice(0,100)}</div>`;
    html+=`</div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

async function renderAgents(el){
  const r=await api('/api/v3/readiness/agents');
  if(!r.ok){el.innerHTML='<p>No agent data</p>';return}
  let html='<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">Agent Roles</h2><table><tr><th>Role</th><th>Name</th><th>Risk</th><th>Capabilities</th><th>Delegates To</th></tr>';
  for(const a of r.data){
    html+=`<tr><td><strong>${a.role}</strong></td><td>${a.name}</td><td>${pill(a.risk_level)}</td><td>${a.capabilities.join(', ')}</td><td>${a.can_delegate_to.join(', ')||'—'}</td></tr>`;
  }
  html+='</table></div>';
  el.innerHTML=html;
}

async function renderSkills(el){
  const r=await api('/api/v3/readiness/skills');
  if(!r.ok){el.innerHTML='<p>No skill data</p>';return}
  let html=`<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">${r.data.count} Skills Loaded</h2><table><tr><th>ID</th><th>Domain</th><th>Version</th><th>Logic</th><th>Examples</th></tr>`;
  for(const s of r.data.skills){
    html+=`<tr><td>${s.id}</td><td>${s.domain}</td><td>${s.version}</td><td>${s.has_logic?'✅':'❌'}</td><td>${s.has_examples?'✅':'❌'}</td></tr>`;
  }
  html+='</table></div>';
  el.innerHTML=html;
}

async function renderTools(el){
  const r=await api('/api/v3/readiness/tools');
  if(!r.ok){el.innerHTML='<p>No tool data</p>';return}
  let html='<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">Tool Readiness</h2><table><tr><th>Tool</th><th>Ready</th><th>Risk</th><th>Approval</th><th>Missing</th></tr>';
  for(const t of r.data){
    const ready=t.ready?'✅':'❌';
    const missing=[...(t.missing_secrets||[]),...(t.missing_configs||[])];
    html+=`<tr><td>${t.tool_id}</td><td>${ready}</td><td>${pill(t.risk_level||'low')}</td><td>${t.requires_approval?'⚠️ Required':'Auto'}</td><td>${missing.join(', ')||'—'}</td></tr>`;
  }
  html+='</table></div>';
  el.innerHTML=html;
}

async function renderPlans(el){
  const r=await api('/api/v3/plans');
  if(!r.ok||!r.data.length){el.innerHTML='<div class="section"><h2 style="color:#f0f6fc">No Plans Yet</h2><p style="color:#8b949e">Create plans via API or instantiate from templates.</p></div>';return}
  let html='<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">Execution Plans</h2><table><tr><th>ID</th><th>Goal</th><th>Status</th><th>Steps</th><th>Progress</th><th>Risk</th></tr>';
  for(const p of r.data){
    html+=`<tr><td>${p.plan_id.slice(0,12)}</td><td>${p.goal.slice(0,40)}</td><td>${p.status}</td><td>${p.step_count}</td><td>${Math.round(p.progress*100)}%</td><td>${pill(p.risk_score)}</td></tr>`;
  }
  html+='</table></div>';
  el.innerHTML=html;
}

async function renderHistory(el){
  const[h,p]=await Promise.all([api('/api/v3/execution-history?limit=20'),api('/api/v3/execution-history/stats')]);
  let html='<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">Execution History</h2>';
  if(p.ok){const s=p.data;html+=`<div class="grid"><div class="card"><h3>Total</h3><div class="val">${s.total}</div></div><div class="card"><h3>Success Rate</h3><div class="val">${Math.round(s.success_rate*100)}%</div></div></div>`}
  if(h.ok&&h.data.length){
    html+='<table><tr><th>Goal</th><th>Template</th><th>Success</th><th>Tools</th><th>Duration</th></tr>';
    for(const r of h.data){html+=`<tr><td>${(r.goal||'').slice(0,40)}</td><td>${r.template_id||'—'}</td><td>${r.success?'✅':'❌'}</td><td>${(r.tools_used||[]).join(', ')||'—'}</td><td>${r.duration_ms}ms</td></tr>`}
    html+='</table>';
  }else html+='<p style="color:#8b949e">No executions recorded yet.</p>';
  html+='</div>';el.innerHTML=html;
}

async function renderTemplates(el){
  const r=await api('/api/v3/templates');
  if(!r.ok){el.innerHTML='<p>No templates</p>';return}
  let html='<div class="section"><h2 style="color:#f0f6fc;margin-bottom:16px">Workflow Templates</h2>';
  for(const t of r.data){
    html+=`<div class="card" style="margin-bottom:12px"><h3>${t.name}</h3><p style="color:#8b949e;margin:8px 0">${t.description}</p>`;
    html+=`<p><strong>Steps:</strong> ${t.steps.length} | <strong>Risk:</strong> ${pill(t.risk_level||'low')}</p>`;
    html+=`<details style="margin-top:8px"><summary style="cursor:pointer;color:#58a6ff">View steps</summary><ol style="padding-left:20px;margin-top:8px">`;
    for(const s of t.steps)html+=`<li style="margin:4px 0">${s.name} <span style="color:#8b949e">(${s.type}: ${s.id})</span></li>`;
    html+=`</ol></details></div>`;
  }
  html+='</div>';el.innerHTML=html;
}

// Init
if(!T){location.href='/login.html'}
showTab('overview');
</script>
</body>
</html>
