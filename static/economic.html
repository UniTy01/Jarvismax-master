<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — Economic Intelligence</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 1200px; margin: 0 auto; }
h1 { margin-bottom: 20px; color: var(--accent); font-size: 1.5rem; }
h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.card h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 10px; }
.stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.stat:last-child { border-bottom: none; }
.stat-label { color: var(--muted); font-size: 0.85rem; }
.stat-value { font-weight: 600; }
.score-good { color: var(--green); }
.score-warn { color: var(--yellow); }
.score-bad { color: var(--red); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.badge-use { background: #1f3a2a; color: var(--green); }
.badge-avoid { background: #3a1f1f; color: var(--red); }
.badge-investigate { background: #3a3a1f; color: var(--yellow); }
.rec-list { list-style: none; }
.rec-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.rec-list li:last-child { border-bottom: none; }
.rec-type { margin-right: 8px; }
.chain { padding: 8px; margin-bottom: 8px; background: rgba(88,166,255,0.05); border-radius: 6px; }
.chain-steps { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
.loading { color: var(--muted); font-style: italic; }
.nav { margin-bottom: 20px; }
.nav a { color: var(--accent); text-decoration: none; margin-right: 12px; font-size: 0.9rem; }
.nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="nav">
  <a href="/">← Dashboard</a>
  <a href="/operations.html">Operations</a>
  <a href="/runs.html">Runs</a>
</div>

<h1>🏦 Economic Intelligence</h1>

<div class="grid">
  <div class="card" id="stats-card">
    <h3>Strategy Performance</h3>
    <div id="stats-content" class="loading">Loading...</div>
  </div>
  <div class="card" id="recs-card">
    <h3>Recommendations</h3>
    <div id="recs-content" class="loading">Loading...</div>
  </div>
</div>

<div class="grid">
  <div class="card" id="memory-card">
    <h3>Recent Strategic Records</h3>
    <div id="memory-content" class="loading">Loading...</div>
  </div>
  <div class="card" id="chains-card">
    <h3>Playbook Chains</h3>
    <div id="chains-content" class="loading">Loading...</div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('jarvis_token') || '';
const headers = TOKEN ? {'Authorization': `Bearer ${TOKEN}`, 'X-Jarvis-Token': TOKEN} : {};

async function fetchJSON(url) {
  try {
    const r = await fetch(url, {headers});
    return await r.json();
  } catch(e) { return null; }
}

function scoreClass(v) { return v >= 0.7 ? 'score-good' : v >= 0.4 ? 'score-warn' : 'score-bad'; }
function badgeClass(t) {
  if (t.includes('use')) return 'badge-use';
  if (t.includes('avoid')) return 'badge-avoid';
  return 'badge-investigate';
}

async function loadStats() {
  const data = await fetchJSON('/api/v3/economic/stats');
  const el = document.getElementById('stats-content');
  if (!data || !data.stats || data.stats.length === 0) {
    el.innerHTML = '<div style="color:var(--muted)">No strategy data yet. Execute a playbook to start learning.</div>';
    return;
  }
  el.innerHTML = data.stats.map(s => `
    <div class="stat">
      <span class="stat-label">${s.strategy_type}</span>
      <span class="stat-value ${scoreClass(s.avg_score)}">${(s.avg_score*100).toFixed(0)}% (${s.count} runs)</span>
    </div>
  `).join('');
}

async function loadRecs() {
  const data = await fetchJSON('/api/v3/economic/recommendations');
  const el = document.getElementById('recs-content');
  if (!data || !data.evaluations) {
    el.innerHTML = '<div style="color:var(--muted)">Unavailable</div>';
    return;
  }
  const recs = data.evaluations.flatMap(e => e.recommendations.map(r => ({...r, strategy: e.strategy_type})));
  if (recs.length === 0) {
    el.innerHTML = '<div style="color:var(--muted)">No recommendations yet.</div>';
    return;
  }
  el.innerHTML = '<ul class="rec-list">' + recs.slice(0, 8).map(r => `
    <li>
      <span class="badge ${badgeClass(r.recommendation_type)} rec-type">${r.recommendation_type}</span>
      <strong>${r.playbook_id || r.strategy}</strong> — ${r.rationale.slice(0, 80)}
    </li>
  `).join('') + '</ul>';
}

async function loadMemory() {
  const data = await fetchJSON('/api/v3/economic/memory?limit=10');
  const el = document.getElementById('memory-content');
  if (!data || !data.records || data.records.length === 0) {
    el.innerHTML = '<div style="color:var(--muted)">No records yet. Execute playbooks to build strategic memory.</div>';
    return;
  }
  el.innerHTML = data.records.slice(0, 6).map(r => `
    <div class="stat">
      <span class="stat-label">${r.strategy_type} — ${r.goal.slice(0, 40)}</span>
      <span class="stat-value ${scoreClass(r.outcome_score)}">${(r.outcome_score*100).toFixed(0)}%</span>
    </div>
  `).join('');
}

async function loadChains() {
  const data = await fetchJSON('/api/v3/economic/chains');
  const el = document.getElementById('chains-content');
  if (!data || !data.chains) {
    el.innerHTML = '<div style="color:var(--muted)">Unavailable</div>';
    return;
  }
  const chains = Object.values(data.chains);
  el.innerHTML = chains.map(c => `
    <div class="chain">
      <strong>${c.name}</strong>
      <div class="chain-steps">${c.steps.map(s => s.playbook_id).join(' → ')} (${c.step_count} steps)</div>
    </div>
  `).join('');
}

loadStats();
loadRecs();
loadMemory();
loadChains();
</script>
</body>
</html>
