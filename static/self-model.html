<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JarvisMax — Self-Model</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; padding: 1rem; }
  h1 { color: #60a5fa; margin-bottom: 0.5rem; font-size: 1.4rem; }
  .subtitle { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .card { background: #1a1d27; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #2a2d37; }
  .card h2 { font-size: 1rem; color: #93c5fd; margin-bottom: 0.5rem; }
  .score { font-size: 2.5rem; font-weight: bold; text-align: center; padding: 0.5rem; }
  .score.high { color: #34d399; }
  .score.mid { color: #fbbf24; }
  .score.low { color: #f87171; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin: 2px; }
  .pill.ready { background: #065f46; color: #34d399; }
  .pill.degraded { background: #78350f; color: #fbbf24; }
  .pill.unavailable { background: #7f1d1d; color: #fca5a5; }
  .pill.approval { background: #312e81; color: #a5b4fc; }
  .pill.healthy { background: #065f46; color: #34d399; }
  .pill.unknown { background: #374151; color: #9ca3af; }
  .item { padding: 0.4rem 0; border-bottom: 1px solid #2a2d37; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
  .item:last-child { border-bottom: none; }
  .item .name { flex: 1; }
  .limitation { padding: 0.4rem 0; border-bottom: 1px solid #2a2d37; font-size: 0.85rem; }
  .limitation .sev { font-weight: 600; margin-right: 0.5rem; }
  .sev.high { color: #f87171; }
  .sev.medium { color: #fbbf24; }
  .sev.low { color: #9ca3af; }
  .autonomy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .autonomy-item { font-size: 0.85rem; }
  .autonomy-item .label { color: #888; }
  .autonomy-item .value { font-weight: 600; }
  .refresh-btn { background: #1e40af; color: white; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .refresh-btn:hover { background: #2563eb; }
  .loading { color: #888; font-style: italic; }
  .nav { margin-bottom: 1rem; }
  .nav a { color: #60a5fa; text-decoration: none; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="nav"><a href="/">← Dashboard</a></div>
<h1>🧠 System Self-Model</h1>
<p class="subtitle">Runtime introspection — what Jarvis can and cannot do right now</p>
<button class="refresh-btn" onclick="load()">↻ Refresh</button>

<div id="content"><p class="loading">Loading self-model...</p></div>

<script>
const TOKEN = localStorage.getItem('jarvis_token') || sessionStorage.getItem('jarvis_token') || '';

async function api(path) {
  const r = await fetch(path, {
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'X-Jarvis-Token': TOKEN }
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

function scoreClass(s) { return s >= 0.7 ? 'high' : s >= 0.4 ? 'mid' : 'low'; }
function statusPill(s) {
  const cls = s === 'ready' || s === 'healthy' ? 'ready'
    : s === 'degraded' ? 'degraded'
    : s === 'approval_required' ? 'approval'
    : s === 'unknown' ? 'unknown'
    : 'unavailable';
  return `<span class="pill ${cls}">${s}</span>`;
}

async function load() {
  const el = document.getElementById('content');
  el.innerHTML = '<p class="loading">Loading...</p>';
  try {
    const [summary, caps, lims, runtime] = await Promise.all([
      api('/api/v3/self-model/summary'),
      api('/api/v3/self-model/capabilities'),
      api('/api/v3/self-model/limitations'),
      api('/api/v3/self-model/runtime'),
    ]);
    const s = summary.data;
    const c = caps.data;
    const l = lims.data;
    const rt = runtime.data;

    let html = '';

    // Readiness score
    html += `<div class="card"><h2>Readiness</h2>
      <div class="score ${scoreClass(s.readiness_score)}">${(s.readiness_score * 100).toFixed(0)}%</div>
      <div style="text-align:center;font-size:0.8rem;color:#888">Generated in ${s.generation_ms}ms</div>
    </div>`;

    // Health signals
    html += '<div class="card"><h2>System Health</h2>';
    for (const [name, status] of Object.entries(s.health || {})) {
      html += `<div class="item"><span class="name">${name}</span>${statusPill(status)}</div>`;
    }
    html += '</div>';

    // Ready capabilities
    if (c.ready && c.ready.length > 0) {
      html += `<div class="card"><h2>Ready Capabilities (${c.ready.length})</h2>`;
      for (const cap of c.ready.slice(0, 20)) {
        html += `<div class="item"><span class="name">${cap.id}</span><span style="color:#888;font-size:0.75rem">${cap.source}</span></div>`;
      }
      if (c.ready.length > 20) html += `<div class="item" style="color:#888">...and ${c.ready.length - 20} more</div>`;
      html += '</div>';
    }

    // Approval required
    if (c.approval_required && c.approval_required.length > 0) {
      html += `<div class="card"><h2>Requires Approval (${c.approval_required.length})</h2>`;
      for (const cap of c.approval_required) {
        html += `<div class="item"><span class="name">${cap.id}</span>${statusPill('approval_required')}</div>`;
      }
      html += '</div>';
    }

    // Degraded
    if (c.degraded && c.degraded.length > 0) {
      html += `<div class="card"><h2>Degraded (${c.degraded.length})</h2>`;
      for (const d of c.degraded) {
        html += `<div class="item"><span class="name">${d.id}</span><span style="color:#888;font-size:0.75rem">${d.type}</span></div>`;
      }
      html += '</div>';
    }

    // Known limitations
    html += `<div class="card"><h2>Known Limitations (${l.total})</h2>`;
    if (l.limitations.length === 0) {
      html += '<div class="item" style="color:#34d399">No limitations detected ✓</div>';
    } else {
      for (const lim of l.limitations) {
        html += `<div class="limitation"><span class="sev ${lim.severity}">${lim.severity.toUpperCase()}</span>${lim.description}</div>`;
      }
    }
    html += '</div>';

    // Autonomy
    html += '<div class="card"><h2>Autonomy Envelope</h2><div class="autonomy-grid">';
    const auto = s.autonomy || {};
    html += `<div class="autonomy-item"><div class="label">Mode</div><div class="value">${auto.mode || '?'}</div></div>`;
    html += `<div class="autonomy-item"><div class="label">Max risk (auto)</div><div class="value">${auto.max_risk_auto || '?'}</div></div>`;
    html += `<div class="autonomy-item"><div class="label">Tools need approval</div><div class="value">${auto.tools_need_approval ? 'Yes' : 'No'}</div></div>`;
    html += `<div class="autonomy-item"><div class="label">Code patches need approval</div><div class="value">${auto.code_patches_need_approval ? 'Yes' : 'No'}</div></div>`;
    html += `<div class="autonomy-item"><div class="label">Max files/patch</div><div class="value">${auto.max_files || '?'}</div></div>`;
    html += `<div class="autonomy-item"><div class="label">Max steps/mission</div><div class="value">${auto.max_steps || '?'}</div></div>`;
    html += '</div></div>';

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="card"><h2>Error</h2><p>${e.message}</p><p>Ensure you are logged in.</p></div>`;
  }
}

load();
</script>
</body>
</html>
