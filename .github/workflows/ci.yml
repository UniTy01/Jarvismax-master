# ================================================================
# JARVIS MAX — Main CI Pipeline
#
# Two jobs:
#   1. unit-tests : 95 focused regression tests — no external services
#                   required. Runs on every push/PR. Must stay green.
#   2. integration-tests : full stack + LLM — runs only when secrets
#                   are present (scheduled or manual trigger).
#
# Gate rules:
#   • unit-tests MUST pass on every PR to main.
#   • integration-tests skip gracefully if secrets are absent.
#   • Smoke tests (test_e2e_smoke.py) require --run-infra-tests flag.
# ================================================================

name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — triggers integration job with secrets
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests (requires secrets)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Unit tests (no external services) ─────────────────────────────────
jobs:
  unit-tests:
    name: Unit Tests (95 regression tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # NOTE: Deliberate manual list (not -r requirements.txt).
        # unit-tests job installs only what 95 focused regression tests need,
        # keeping CI fast and isolated from heavyweight production deps.
        # If you add a test that needs a new import, add it here too.
        run: |
          pip install --quiet \
            pytest pytest-asyncio structlog pydantic pydantic-settings \
            fastapi uvicorn langchain-core langchain-anthropic langchain-openai \
            sqlalchemy aiosqlite

      - name: Run terminal state regression tests (20 tests)
        run: |
          python -m pytest tests/test_terminal_state_truth.py -v --tb=short

      - name: Run canonical mission persistence tests (17 tests)
        run: |
          python -m pytest tests/test_canonical_mission_persistence.py -v --tb=short

      - name: Run hierarchical planner regression tests (21 tests)
        run: |
          python -m pytest tests/test_hierarchical_planner.py -v --tb=short

      - name: Run production hardening tests (37 tests)
        run: |
          python -m pytest tests/test_production_hardening_p34.py -v --tb=short

      - name: Confirm 95 total pass, 0 skipped
        run: |
          python -m pytest \
            tests/test_terminal_state_truth.py \
            tests/test_canonical_mission_persistence.py \
            tests/test_hierarchical_planner.py \
            tests/test_production_hardening_p34.py \
            --tb=short -q

  # ── Job 2: Integration tests (requires live stack + secrets) ─────────────────
  integration-tests:
    name: Integration Tests (live stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on schedule, manual dispatch, or if secrets are set
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.run_integration == 'true'

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install all dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Start Jarvis Max server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JARVIS_ADMIN_PASSWORD: ${{ secrets.JARVIS_ADMIN_PASSWORD }}
          JARVIS_SECRET_KEY: ${{ secrets.JARVIS_SECRET_KEY }}
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          WORKSPACE_DIR: /tmp/jarvis_ci_workspace
        run: |
          mkdir -p /tmp/jarvis_ci_workspace
          python main.py &
          sleep 10
          curl -sf http://localhost:8000/health || (echo "Server failed to start" && exit 1)

      - name: Run smoke tests (requires live server)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JARVIS_ADMIN_PASSWORD: ${{ secrets.JARVIS_ADMIN_PASSWORD }}
        run: |
          python -m pytest tests/smoke/ \
            --run-infra-tests \
            -v --tb=short \
            --timeout=120

      - name: Run integration-marked tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JARVIS_ADMIN_PASSWORD: ${{ secrets.JARVIS_ADMIN_PASSWORD }}
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
        run: |
          python -m pytest \
            --run-infra-tests \
            -m integration \
            -v --tb=short \
            --timeout=120

      - name: Boot verification script
        env:
          JARVIS_ADMIN_PASSWORD: ${{ secrets.JARVIS_ADMIN_PASSWORD }}
        run: |
          bash scripts/verify_boot.sh
